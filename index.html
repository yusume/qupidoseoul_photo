<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PhotoFrame MVP</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="left">
      <select id="layoutSelect"></select>
      <button id="exportBtn">PNG 저장</button>
      <label class="ctrl">
        로고색
        <input id="logoColor" type="color" value="#000000" />
      </label>
    </div>
    
    <div id="idLayoutCtrls" style="display: none; gap: 15px; align-items: center;">
      <div style="border-right: 1px solid var(--border); padding-right: 10px; display: flex; gap: 5px; align-items: center;">
        <span style="font-size: 12px; color: var(--muted); font-weight: bold;">[35x45 사진 전체]:</span>
        <!-- <button id="rotateLeftBtn" style="height:28px; padding:0 6px; font-size:12px;">90도 회전</button> -->
        <button id="flipLeftBtn" style="height:28px; padding:0 6px; font-size:12px;">좌우반전</button>
        <button id="flipVLeftBtn" style="height:28px; padding:0 6px; font-size:12px;">상하반전</button>
      </div>
      <div style="display: flex; gap: 5px; align-items: center;">
        <span style="font-size: 12px; color: var(--muted); font-weight: bold;">[30x40 사진 전체]:</span>
        <!-- <button id="rotateRightBtn" style="height:28px; padding:0 6px; font-size:12px;">90도 회전</button> -->
        <button id="flipRightBtn" style="height:28px; padding:0 6px; font-size:12px;">좌우반전</button>
        <button id="flipVRightBtn" style="height:28px; padding:0 6px; font-size:12px;">상하반전</button>
      </div>
    </div>
  </header>
  <!-- 필터 패널 -->
  <div id="filterPanel" style="display:none;">
    <div class="filter-panel-inner">
      <span class="filter-label">필터</span>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="none">원본</button>
        <button class="filter-btn" data-filter="grayscale">흑백</button>
        <button class="filter-btn" data-filter="sepia">세피아</button>
        <button class="filter-btn" data-filter="vintage">빈티지</button>
        <button class="filter-btn" data-filter="sharpen">선명</button>
      </div>
      <div class="filter-sliders" id="brightnessSliders">
        <label class="slider-ctrl">
          <span>밝기</span>
          <input type="range" id="brightnessInput" min="-100" max="100" value="0" />
          <span id="brightnessVal">0</span>
        </label>
        <label class="slider-ctrl">
          <span>대비</span>
          <input type="range" id="contrastInput" min="-100" max="100" value="0" />
          <span id="contrastVal">0</span>
        </label>
      </div>
    </div>
  </div>

  <main class="stage">
   <div id="canvasWrap" style="position:relative; width:100mm; height:150mm;">
      <canvas id="c"></canvas>
      <div id="svgOverlay" style="position:absolute; inset:0;"></div>
      <input id="fileInput" type="file" accept="image/*" />
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
